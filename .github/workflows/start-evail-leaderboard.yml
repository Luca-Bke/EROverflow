name: Trigger Leaderboard

on:
  push:
    branches:
      - main

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger workflow in leaderboard repo
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.LEADERBOARD_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/CShark-4891/terminal-bench-leaderboard/actions/workflows/run-scenario.yml/dispatches \
            -d '{"ref":"main","inputs":{}}'